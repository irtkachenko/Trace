name: telegraf

services:
  app:
    container_name: telegraf
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: telegraf-app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
